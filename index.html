<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 공장장(YouTube) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(31, 40, 51, 0.8); backdrop-filter: blur(10px); border: 1px solid #45a29e; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-[#66fcf1] mb-2"><i class="fab fa-youtube"></i> 1004MAS YOUTUBE FACTORY</h1>
    <p class="text-gray-400 mb-8">글로벌 하이엔드 다큐 무인 자동화 공장 감시망</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4">채널 가동 현황</h2>
            <ul class="space-y-4">
                <li class="bg-black/50 p-3 rounded-lg flex justify-between items-center">
                    <span class="text-white">AI_TECH MIX (EN)</span>
                    <span class="text-[#66fcf1] font-bold">100% (업로드 완료)</span>
                </li>
                <li class="bg-black/50 p-3 rounded-lg flex justify-between items-center">
                    <span class="text-white">마스터피스 다큐 2편 (KR)</span>
                    <span class="text-yellow-400 font-bold">42% (초벌 렌더링 중)</span>
                </li>
            </ul>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-[#66fcf1]">
            <h2 class="text-lg font-bold text-white mb-2"><i class="fas fa-server"></i> 워커 노드 상태</h2>
            <p class="text-gray-300 text-sm leading-relaxed">
                파이썬 FFmpeg 엔진 정상. 비동기 렌더링 최적화 100%. 스토리지 용량 320GB 남음.
            </p>
        </div>
    </div>

    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-[#45a29e] hover:text-white underline">포탈(Portal) 복귀</a></div>
</body>
</html>
